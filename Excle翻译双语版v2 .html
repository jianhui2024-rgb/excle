<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>工程文档中英对照翻译工具 - 进度增强版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; max-width: 900px; margin: 0 auto; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        #drop-zone { 
            border: 2px dashed #3498db; padding: 50px; text-align: center; 
            cursor: pointer; border-radius: 10px; background: #ebf5fb;
            transition: all 0.3s ease;
        }
        #drop-zone:hover { background: #d6eaf8; border-color: #2980b9; }
        
        /* 进度条样式 */
        .progress-container { margin-top: 30px; display: none; }
        .progress-bar-bg { width: 100%; background-color: #eee; border-radius: 20px; overflow: hidden; height: 20px; }
        .progress-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); transition: width 0.2s; }
        
        .status-text { margin-top: 10px; font-weight: bold; color: #34495e; display: flex; justify-content: space-between; }
        .info { color: #7f8c8d; font-size: 0.85em; margin-top: 15px; background: #fdf2e9; padding: 10px; border-left: 4px solid #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <h2>Excel 多工作表翻译工具 <small style="font-size: 0.5em; color: #7f8c8d;">(作者：汤剑辉20260303)</small></h2>
    
    <div id="drop-zone">将 Excel 文件拖拽至此，或点击上传</div>
    <input type="file" id="file-input" style="display:none" accept=".xlsx">

    <div id="progress-area" class="progress-container">
        <div class="status-text">
            <span id="status-msg">准备就绪</span>
            <span id="status-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
        <div id="counter-detail" style="font-size: 0.8em; color: #95a5a6; margin-top: 5px;"></div>
    </div>

    <div class="info">
        <strong>提示：</strong> 本工具会将中文翻译添加在英文下方。
        <br>※ <strong>保留公式：</strong> 含有公式的单元格将跳过，确保计算逻辑不被破坏。
        <br>※ <strong>自动换行：</strong> 翻译后的单元格会自动开启“自动换行”属性。
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const progressArea = document.getElementById('progress-area');
    const progressFill = document.getElementById('progress-fill');
    const statusMsg = document.getElementById('status-msg');
    const statusPercent = document.getElementById('status-percent');
    const counterDetail = document.getElementById('counter-detail');

    // 翻译引擎
    async function translateText(text) {
        if (!text || typeof text !== 'string' || !/[a-zA-Z]/.test(text)) return null;
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            return data[0].map(item => item[0]).join('');
        } catch (error) {
            return null;
        }
    }

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        progressArea.style.display = 'block';
        statusMsg.innerText = "读取文件中...";
        progressFill.style.width = '0%';
        
        const workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(file);

        let tasks = [];
        workbook.eachSheet((worksheet) => {
            worksheet.eachRow((row) => {
                row.eachCell((cell) => {
                    if (cell.type === ExcelJS.ValueType.String && !cell.formula) {
                        tasks.push(cell);
                    }
                });
            });
        });

        const total = tasks.length;
        let completed = 0;
        const batchSize = 5; 

        statusMsg.innerText = "正在进行双语翻译...";
        
        for (let i = 0; i < tasks.length; i += batchSize) {
            const batch = tasks.slice(i, i + batchSize);
            
            await Promise.all(batch.map(async (cell) => {
                const originalValue = cell.value;
                const translated = await translateText(originalValue);
                
                if (translated && translated !== originalValue) {
                    // 拼接中英文，使用 \r\n 换行
                    cell.value = `${originalValue}\r\n(${translated})`;
                    // 核心：设置自动换行样式，否则换行符在 Excel 中不可见
                    cell.alignment = { 
                        wrapText: true, 
                        vertical: 'top', 
                        horizontal: 'left' 
                    };
                }
                
                completed++;
                const percent = Math.round((completed / total) * 100);
                progressFill.style.width = percent + '%';
                statusPercent.innerText = percent + '%';
                counterDetail.innerText = `已处理: ${completed} / 总计: ${total}`;
            }));
        }

        statusMsg.innerText = "正在打包生成对照版 Excel...";
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Bilingual_${file.name}`;
        a.click();
        
        statusMsg.innerText = "翻译任务已完成！";
        statusMsg.style.color = "#27ae60";
    };
</script>
</body>
</html>
